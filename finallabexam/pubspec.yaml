  //================ BOOK MODEL ================
  
  class Book {
  final int? bookId;
  final String bookName;
  final String author;
  final int quantity;
  final double price;

  Book({
  this.bookId,
  required this.bookName,
  required this.author,
  required this.quantity,
  required this.price,
});

  Map<String, dynamic> toMap() {
  return {
'bookId': bookId,
'bookName': bookName,
'author': author,
'quantity': quantity,
'price': price,
};
}

  factory Book.fromMap(Map<String, dynamic> map) {
  return Book(
bookId: map['bookId'],
bookName: map['bookName'],
author: map['author'],
quantity: map['quantity'],
price: map['price'],
  );
}
}

  //================ DATABASE ================
  
  class DBHelper {
  DBHelper._privateConstructor();

  static final DBHelper instance = DBHelper._privateConstructor();

  static Database? _db;

  Future<Database> get database async =>
  _db ??= await _initDB();

  Future<Database> _initDB() async {
  String path =
  join(await getDatabasesPath(), "bookstore.db");
  
  return await openDatabase(
  path,
version: 1,
onCreate: _onCreate,
  );
}

  Future _onCreate(Database db, int version) async {
  await db.execute('''
  CREATE TABLE book(
  bookId INTEGER PRIMARY KEY AUTOINCREMENT,
  bookName TEXT,
  author TEXT,
  quantity INTEGER,
  price REAL
  )
  ''');
  }

  Future<int> insertBook(Book b) async {
    Database db = await instance.database;
    return await db.insert('book', b.toMap());
}

  Future<List<Book>> getBooks() async {
  Database db = await instance.database;
  
  final List<Map<String, dynamic>> list =
  await db.query('book');
  
  return List.generate(
  list.length,
  (i) => Book.fromMap(list[i]),
  );
}

  Future<int> updateBook(Book b) async {
  Database db = await instance.database;
  
  return await db.update(
  'book',
  b.toMap(),
where: 'bookId=?',
whereArgs: [b.bookId],
  );
  }

  Future<int> deleteBook(int id) async {
  Database db = await instance.database;
  
  return await db.delete(
  'book',
where: 'bookId=?',
whereArgs: [id],
  );
  }
}

  //================ UI ================
  
  class BookPage extends StatefulWidget {
  @override
  State<BookPage> createState() => BookPageState();
}

  class BookPageState extends State<BookPage> {
  TextEditingController txtBook =
  TextEditingController();

  TextEditingController txtAuthor =
  TextEditingController();

  TextEditingController txtQty =
  TextEditingController();

  TextEditingController txtPrice =
  TextEditingController();

  Book? selectedBook;

  void clearFields() {
  txtBook.clear();
  txtAuthor.clear();
  txtQty.clear();
  txtPrice.clear();
  selectedBook = null;
  }

  void refresh() {
  setState(() {});
  }

  bool validate() {
  if (txtBook.text.isEmpty ||
  txtAuthor.text.isEmpty ||
  txtQty.text.isEmpty ||
  txtPrice.text.isEmpty) {
  ScaffoldMessenger.of(context).showSnackBar(
  SnackBar(
content: Text("All fields are required"),
  ),
  );
  return false;
}

  return true;
}

  @override
  Widget build(BuildContext context) {
  return Scaffold(
appBar: AppBar(
  title: Text("Book Store Inventory"),
  ),
body: Padding(
  padding: EdgeInsets.all(15),
  child: Column(
    children: [

      TextField(
      controller: txtBook,
      decoration:
        InputDecoration(labelText: "Book Name"),
      ),

      TextField(
      controller: txtAuthor,
      decoration:
        InputDecoration(labelText: "Author"),
      ),

      TextField(
      controller: txtQty,
      keyboardType: TextInputType.number,
      decoration:
        InputDecoration(labelText: "Quantity"),
      ),

      TextField(
      controller: txtPrice,
      keyboardType: TextInputType.number,
      decoration:
        InputDecoration(labelText: "Price"),
      ),

      SizedBox(height: 15),

      Row(
      children: [
        ElevatedButton(
        onPressed: () async {
                              if (!validate()) return;
                              
                              Book b = Book(
          bookName: txtBook.text,
          author: txtAuthor.text,
          quantity:
            int.parse(txtQty.text),
          price:
            double.parse(txtPrice.text),
                              );
                              
                              await DBHelper.instance
                              .insertBook(b);
                              
                              clearFields();
                              refresh();
        },
        child: Text("Add"),
        ),

        SizedBox(width: 10),

        ElevatedButton(
        onPressed: selectedBook == null
          ? null
            : () async {
                         if (!validate()) return;
                         
                         Book b = Book(
            bookId:
              selectedBook!.bookId,
            bookName: txtBook.text,
            author: txtAuthor.text,
            quantity: int.parse(
              txtQty.text),
            price: double.parse(
              txtPrice.text),
                         );
                         
                         await DBHelper.instance
                         .updateBook(b);
                         
                         clearFields();
                         refresh();
          },
        child: Text("Update"),
        ),
      ],
      ),

      Divider(),

      Expanded(
      child: FutureBuilder<List<Book>>(
        future: DBHelper.instance.getBooks(),
      builder: (context, snapshot) {
                                     if (!snapshot.hasData) {
        return Center(
        child:
          CircularProgressIndicator(),
        );
      }

                                     List<Book> books =
                                     snapshot.data!;
                                     
                                     double totalValue = 0;
                                     
                                     for (var b in books) {
        totalValue +=
        b.quantity * b.price;
      }

                                     return Column(
        children: [

          Text(
          "Total Inventory Value = Rs. ${totalValue.toStringAsFixed(2)}",
          style: TextStyle(
            fontSize: 18,
          fontWeight:
            FontWeight.bold,
          ),
          ),

          SizedBox(height: 10),

          Expanded(
          child: ListView.builder(
            itemCount: books.length,
          itemBuilder:
            (context, index) {
                               Book b = books[index];
                               
                               double stockValue =
                               b.quantity *
                               b.price;
                               
                               return Card(
            child: ListTile(
              title:
                Text(b.bookName),

            subtitle: Text(
                        "Author: ${b.author}\n"
                        "Quantity: ${b.quantity}\n"
                        "Price: Rs. ${b.price}\n"
                        "Stock Value: Rs. ${stockValue.toStringAsFixed(2)}",
                               ),

            onTap: () {
                        setState(() {
              selectedBook =
              b;
              
              txtBook.text =
              b.bookName;
              
              txtAuthor.text =
              b.author;
              
              txtQty.text =
              b.quantity
              .toString();
              
              txtPrice.text =
              b.price
              .toString();
            });
            },

            trailing:
              IconButton(
              icon: Icon(
                Icons.delete),
            onPressed:
                () async {
                           await DBHelper
                           .instance
                           .deleteBook(
                           b.bookId!);
                           
                           refresh();
            },
                               ),
                               ),
                               );
          },
          ),
          ),
        ],
                                     );
      },
      ),
      ),
    ],
  ),
  ),
  );
  }
}


























